<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/layout.css">
  <link rel="stylesheet" href="/shop.css">
  <script>if (location.port === '3000') document.title += ' — Dev';</script>
</head>
<body>
  <div id="loading" class="splash">Loading...</div>

  <div id="auth-error" class="splash" style="display:none">
    <p>Not authenticated.</p>
    <p class="hint">Run <code>/shop</code> in Discord — the link will log you in.</p>
  </div>

  <div id="session-error" class="splash" style="display:none">
    <p>Shop not found.</p>
    <p class="hint">Run <code>/shop</code> in the correct channel.</p>
  </div>

  <div id="app" style="display:none">
    <div id="layout-root"></div>

    <div id="shop-subhead">
      <p id="shop-name-line"></p>
      <p id="greeting"></p>
    </div>

    <main class="panels">
      <section class="panel">
        <div class="panel-label">For Sale</div>
        <div id="buy-list"></div>
      </section>
      <section class="panel">
        <div class="panel-label">Your Inventory</div>
        <div id="sell-list"></div>
      </section>
    </main>
  </div>

  <div id="toast"></div>

  <script src="/auth.js"></script>
  <script src="/layout.js"></script>
  <script src="/shop.js"></script>
</body>
</html>
