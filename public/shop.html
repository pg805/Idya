<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <link rel="stylesheet" href="/shop.css">
</head>
<body>
  <div id="loading" class="splash">Loading...</div>

  <div id="auth-error" class="splash" style="display:none">
    <p>Not authenticated.</p>
    <p class="hint">Run <code>/shop</code> in Discord — the link will log you in.</p>
  </div>

  <div id="session-error" class="splash" style="display:none">
    <p>Shop not found.</p>
    <p class="hint">Run <code>/shop</code> in the correct channel.</p>
  </div>

  <div id="app" style="display:none">
    <header>
      <div class="header-main">
        <div>
          <h1 id="shop-name"></h1>
          <p id="npc-line"></p>
        </div>
        <div class="korel-box">
          <span class="korel-label">Korel</span>
          <span id="korel-val"></span>
        </div>
      </div>
      <p id="greeting"></p>
    </header>

    <div id="training-bar" style="display:none">
      <span id="training-label"></span>
      <span id="training-level"></span>
      <button id="training-btn" onclick="doTrain()">Train</button>
    </div>

    <main class="panels">
      <section class="panel">
        <div class="panel-label">For Sale</div>
        <div id="buy-list"></div>
      </section>
      <section class="panel">
        <div class="panel-label">Your Inventory</div>
        <div id="sell-list"></div>
      </section>
    </main>
  </div>

  <div id="toast"></div>

  <script src="/shop.js"></script>
</body>
</html>
