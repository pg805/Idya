<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idya Combat</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/layout.css">
  <link rel="stylesheet" href="/game.css">
  <link rel="stylesheet" href="/tour.css">
  <script>if (location.port === '3000') document.title += ' — Dev';</script>
</head>
<body>
  <div id="layout-root"></div>

  <div id="battle-shell">
    <div id="status-bar">
      <span id="turn-label">Turn 1</span>
      <span class="sep">·</span>
      <span id="phase-label">waiting</span>
      <span id="conn-wrap"><span class="sep">·</span><span id="connection-status" class="disconnected">Connecting...</span></span>
      <button id="tour-replay-btn" type="button" title="Replay the battle-screen walkthrough" hidden>Show guide</button>
      <button id="lore-replay-btn" type="button" title="Replay the intro story" hidden>Run lore</button>
      <button id="forfeit-btn" type="button" title="Leave this battle. Bait is gone, no other penalty.">Forfeit</button>
    </div>

    <div id="main-layout">
      <div id="top-row">
        <div id="combatant-list"></div>
        <div id="board-col">
          <div id="board"></div>
          <div id="action-panel"></div>
        </div>
        <div id="right-col">
          <div id="log-header">
            <span>Combat Log</span>
            <div id="log-detail" role="group" aria-label="Log detail">
              <button type="button" data-preset="minimal" title="Just the action lines">Minimal</button>
              <button type="button" data-preset="standard" title="Actions + moves + the resolve breakdown (dice, modifiers, totals)">Standard</button>
              <button type="button" data-preset="story" title="Adds the flavor narration">Story</button>
            </div>
            <button id="log-download" type="button" title="Download full log">⤓</button>
          </div>
          <div id="combat-log"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/error-capture.js"></script>
  <script src="/auth.js"></script>
  <script src="/layout.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/tour.js"></script>
  <script src="/game.js"></script>
  <script>
    (async function initBattleLayout() {
      await claimAuthFromUrl();
      await mountLayout({ title: 'Combat', compact: true });
    })();
  </script>
</body>
</html>
