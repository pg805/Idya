# Dolan - The Fifth Regiment General Store
# Conversation tree (0.3.0). Voice + truth: docs/lore/dolan.md, docs/lore/voice.md.
# House style: no em dashes; concise but educated; vary the rhythm (do not stack
# short declaratives); full sentences over fragments.
#
# `greet` is the opener (entry only). Mid-conversation, sub-nodes return to `hub`,
# which borrows greet's option menu but speaks a short "anything else" bridge so
# he is not re-greeting you every turn.

npc: dolan

entry:
  - node: first_meeting
    conditions: { metBefore: false }
  - node: cold_open
    conditions: { faction: town, opinion: "<=3" }
  - node: greet
    conditions: {}

nodes:

  # ---------- First contact ----------
  first_meeting:
    say:
      - text: "Salvus. A new face. This is the Fifth Regiment General Store, and it
               is mine, so buy if you came to buy and move along if you did not."
    options:
      - text: "You carry yourself like a soldier."
        effects: { familiarity: +1, flag: asked_about_service }
        goto: service_intro
      - text: "Salvus. I am after a hunt. What do you keep?"
        conditions: { faction: empire }
        effects: { opinion: +1 }
        goto: wares
      - text: "Just looking."
        goto: end

  # ---------- Cold open (town-leaning, low opinion) ----------
  cold_open:
    say:
      - text: "Hunter. You again. The counter is right there, and I will assume you
               came to use it rather than to lecture me from across it."
    options:
      - text: "Maybe I came to talk."
        goto: politics
      - text: "To buy. That is all."
        effects: { opinion: +1 }
        goto: hub
      - text: "Forget it."
        goto: end

  # ---------- Opener hub ----------
  greet:
    say:
      - text: "Hunter. It has been a trying day, so do me the courtesy of being brief."
        conditions: { mood: "<=2" }
        weight: 2
      - text: "{playerName}. A fair day for once. What do you need?"
        conditions: { mood: ">=8" }
      - text: "{playerName}. Sit if you like. What is it you need?"
        conditions: { standing: confidant }
      - text: "{playerName}. Back again. What is it this time?"
        conditions: { standing: trusted }
      - text: "{playerName}. What can I get you?"
        conditions: { standing: regular }
      - text: "Hunter. Are you here to buy something, or only to wear out my floorboards?"
        conditions: { opinion: "<5" }
      - text: "Hunter. Take what you came for."
    options:
      - text: "Your shelf is looking light."
        conditions: { lowStock: true }
        goto: low_stock
      - text: "Brought down a fair few swallows out there."
        conditions: { recentHunts: includes lithkem_swallow }
        effects: { opinion: +1 }
        goto: swallow_feathers
      - text: "Put one of the glass children down in the deep wood."
        conditions: { recentHunts: includes child_of_sidaev }
        effects: { opinion: +1 }
        goto: respect_hunt
      - text: "Crossed the sulgovenath and walked away from it."
        conditions: { recentHunts: includes sulgovenath }
        effects: { opinion: +1 }
        goto: respect_hunt
      - text: "Rough stretch. I have lost more than I have won out there."
        conditions: { recentLosses: ">=2" }
        goto: losing
      - text: "That permit is already earning its keep."
        conditions: { recentPurchases: includes swallow_bait }
        effects: { opinion: +1 }
        goto: shop_smalltalk
      - text: "I have felled a fair bit of timber lately."
        conditions: { lumberjackRank: ">=5" }
        effects: { opinion: +1 }
        goto: respect_lumberjack
      - text: "I have been doing enchanting work."
        conditions: { enchanterRank: ">=5" }
        effects: { opinion: +1 }
        goto: respect_enchanter
      - text: "I have been at the forge myself, lately."
        conditions: { blacksmithRank: ">=5" }
        goto: needle_blacksmith
      - text: "Why is your store called the Fifth Regiment?"
        conditions: { sharedHistory: excludes asked_about_service }
        effects: { familiarity: +1, flag: asked_about_service }
        goto: service_intro
      - text: "Back to your old regiment."
        conditions: { sharedHistory: includes asked_about_service }
        goto: service_intro
      - text: "What is worth buying?"
        goto: wares
      - text: "This empire bleeds the town for taxes and calls it order."
        conditions: { faction: town }
        goto: politics
      - text: "Nothing today."
        goto: end

  # ---------- Return bridge -------------------------------------------------
  # Borrows greet's menu, but the line evolves from his view of you and the
  # topic you just left (lastTopic). Topic-aware lines are preferred; mood and
  # standing colour the rest; plain prompts are the fallback.
  hub:
    say:
      # After confiding something real, he shuts the door gently and moves on.
      - text: "That is enough of the old days. What did you actually come in for?"
        conditions: { lastTopic: confided }
      - text: "I have said more than I meant to. Was there something you needed?"
        conditions: { lastTopic: confided }
      # After politics: cooled, transactional.
      - text: "Now. Was there something you needed, or are we finished here?"
        conditions: { lastTopic: politics }
      - text: "That is the end of that subject. The counter is still open, at least."
        conditions: { lastTopic: politics }
      # After he opened up about the service: a rare, grudging near-warmth.
      - text: "Well. I have talked your ear half off. What is it you need?"
        conditions: { lastTopic: service }
      # After the forge needle: still a little sharp.
      - text: "Enough about hammers. What else?"
        conditions: { lastTopic: forge }
      # After giving counsel.
      - text: "Take the advice or leave it. Was there anything else?"
        conditions: { lastTopic: counsel }
      # After a hunt he approves of: businesslike and pleased.
      - text: "Good hunting pays both of us. What else can I do for you?"
        conditions: { lastTopic: hunt }
      # Mood, regardless of subject.
      - text: "If there is more, out with it."
        conditions: { mood: "<=2" }
      - text: "What else? I have the patience for it today."
        conditions: { mood: ">=8" }
      # Standing colour for the people he actually knows.
      - text: "What else, {playerName}?"
        conditions: { standing: confidant }
      # Plain fallbacks (varied so it is not the same prompt each loop).
      - text: "Anything else?"
      - text: "What else do you need?"
      - text: "Go on, then."
      - text: "And?"
    optionsFrom: greet

  # ---------- Service: a thread you pull, not a lecture ----------
  # Short answers; the player drills in. Sub-threads return to service_intro so
  # you stay in the topic until you choose to leave. Explored threads drop off
  # via per-thread flags.
  service_intro:
    topic: service
    say:
      - text: "Hah. My old company, from back when I was a soldier. I made Vexillar
               before the end of it. Ask, if you are curious."
    options:
      - text: "What is a Vexillar?"
        conditions: { sharedHistory: excludes knows_vexillar }
        effects: { flag: knows_vexillar }
        goto: vexillar
      - text: "You fought for the empire?"
        conditions: { sharedHistory: excludes asked_military }
        effects: { flag: asked_military }
        goto: military_man
      - text: "You look Ketulvu yourself."
        conditions: { sharedHistory: excludes remarked_ketulvu }
        effects: { flag: remarked_ketulvu }
        goto: ketulvu_remark
      - text: "Tell me about a battle you fought."
        conditions: { standing: trusted, sharedHistory: excludes heard_war_story }
        effects: { flag: heard_war_story }
        goto: service_story
      - text: "Why did you ever come back here?"
        conditions: { sharedHistory: excludes asked_why_back }
        effects: { familiarity: +1, flag: asked_why_back }
        goto: why_back
      - text: "Another time."
        goto: hub

  vexillar:
    topic: service
    say:
      - text: "The officer who carries the regiment's standard and answers for it.
               The line forms where the standard stands. I held mine a long while."
    options:
      - text: "A lot to answer for."
        goto: service_intro
      - text: "Back to it."
        goto: service_intro

  military_man:
    topic: service
    say:
      - text: "Twenty-six years of it. I saw more of the empire than most men see of
               their own street, and most of it was the better for the empire being
               in it."
    options:
      - text: "Better how? What do you mean, order?"
        conditions: { sharedHistory: excludes heard_order }
        effects: { flag: heard_order }
        goto: order_thread
      - text: "Back to it."
        goto: service_intro

  order_thread:
    topic: service
    say:
      - text: "A road a caravan crosses without an escort. Coin worth the same in
               two towns. You were born into it, so you cannot see it. I watched
               them build it."
    options:
      - text: "And you helped build it."
        goto: order_built
      - text: "Sounds like a sales pitch."
        goto: order_pitch
      - text: "Back to it."
        goto: service_intro

  order_built:
    topic: service
    say:
      - text: "A small part. One regiment, one stretch of road at a time. It is
               enough to know my hands were on it."
    options:
      - text: "Back to it."
        goto: service_intro

  order_pitch:
    topic: service
    say:
      - text: "Call it what you like. I have seen the other thing, the one with no
               roads and no law. You have not. Pray you never do."
    options:
      - text: "Back to it."
        goto: service_intro

  ketulvu_remark:
    topic: service
    say:
      - text: "By blood. Not by anything that matters. I left that behind with the
               rest of what this town tried to make me."
    options:
      - text: "Your own people."
        goto: ketulvu_own
      - text: "But you came back to them."
        goto: ketulvu_back
      - text: "Back to it."
        goto: service_intro

  ketulvu_own:
    topic: service
    say:
      - text: "My people are whoever keeps the roads open and the lamps lit. Blood
               is an accident. What a man chooses is the part worth counting."
    options:
      - text: "Back to it."
        goto: service_intro

  ketulvu_back:
    topic: service
    say:
      - text: "For my mother. Not for them. Do not mistake the one for the other."
    options:
      - text: "Back to it."
        goto: service_intro

  # Warmth buys the STORIES (successes). Trusted-gated.
  service_story:
    topic: service
    say:
      - text: "You want the whole of it? Sit, then. The Fifth held the crossing at
               Velsa for three days against twice our number, and we held it because
               the roads behind us were good enough that the relief actually came
               through on them. That is what order buys a man: supply that arrives
               when it should, and a road still under his boots in the morning.
               Sentiment never held a bridge in its life. Logistics did."
        conditions: { standing: trusted }
      - text: "The Fifth held lines that mattered, and trade moved through that
               country because we were the reason it was safe to. That is the short
               version, and it is the one you get."
    options:
      - text: "And the ones who did not come back?"
        conditions: { standing: confidant, sharedHistory: excludes told_regret }
        effects: { flag: told_regret }
        goto: regret
      - text: "Sounds like you would go back tomorrow."
        conditions: { standing: confidant }
        goto: road_not_taken
      - text: "Good of the empire."
        goto: service_intro

  # confidant-only: a genuine crack (bible #3h)
  regret:
    topic: confided
    say:
      - text:
          - "Some of them I put in the ground where they fell. There are orders I
             would give again without a second thought, and a few I am no longer
             certain were ever mine to give, and I have learned to weigh the good
             against them and let the sum come out where it comes out."
          - "Do not ask me their names. That is where I stop."
    options:
      - text: "I will not, then."
        effects: { opinion: +1 }
        goto: hub

  # confidant-only: the road not taken (bible #3g)
  road_not_taken:
    topic: confided
    say:
      - text: "Go back? No. I am too old, and the army does not keep relics. Still,
               there are nights I wonder what I would have been if I had stayed in
               this town, whether I would be sitting in Fendalok's chair by now,
               with sons and a name people said kindly. Do not repeat that."
    options:
      - text: "Your secret is kept."
        effects: { opinion: +1 }
        goto: hub

  why_back:
    topic: service
    say:
      - text: "My mother fell ill. You go, when that happens. There was nowhere else
               the army still needed an old man anyway."
    options:
      - text: "Fair enough."
        goto: service_intro

  # ---------- Faction friction: dodge first, insult only if pushed ----------
  politics:
    topic: politics
    say:
      - text: "That is not what you came in for. Did you come here to trade, or to
               argue politics with an old soldier who has heard it all before?"
    options:
      - text: "Debating. The empire's boot is heavy here."
        effects: { opinion: -1, flag: mocked_the_empire }
        goto: politics_rebuke
      - text: "Buying. Forget I said it."
        goto: hub
      - text: "Forget it."
        goto: end

  politics_rebuke:
    topic: politics
    say:
      - text: "Heavy. Then you have never once seen what light looks like, because I
               have, and it is not this. I have watched villages settle a quarrel by
               opening a girl's throat over the dirt, and this town is only that same
               chaos with the volume turned down: superstitious, filthy, and proud of
               both. The boot you resent is the only reason you sleep soundly enough
               to resent it. Now then, the counter or the door."
    options:
      - text: "The counter."
        goto: hub
      - text: "The door."
        goto: end

  # ---------- Recent losses: counsel or jab by opinion ----------
  losing:
    topic: counsel
    say:
      - text: "Losing teaches faster than winning ever will, if you let it. So tell
               me what is breaking down out there, your footwork or your nerve."
        conditions: { opinion: ">=5" }
      - text: "Then bleed a little less, or bait something smaller. The forest does
               not grade a man on effort, hunter."
    options:
      - text: "Footwork. They close before I am set."
        conditions: { opinion: ">=5" }
        effects: { familiarity: +1 }
        goto: footwork
      - text: "I will manage."
        goto: hub

  footwork:
    topic: counsel
    say:
      - text: "Then stop meeting them where they want to be met. Choose your ground
               before the fight starts instead of during it, because a line you
               picked is worth twice one you were forced onto. That was most of what
               command ever came down to."
    options:
      - text: "I will try it."
        effects: { opinion: +1 }
        goto: hub

  # ---------- Recent-hunt reads ----------
  swallow_feathers:
    topic: hunt
    say:
      - text: "Swallows. Good. Their feathers are worth more this season than the
               birds have any right to be, now that the Chae have decided plumes are
               in fashion again. You bring me feathers and we both eat, which is the
               only kind of sentiment I have ever trusted: the kind I can bank."
    options:
      - text: "Fashion sets the price?"
        goto: swallow_fashion
      - text: "I will keep them coming."
        effects: { opinion: +1 }
        goto: hub

  swallow_fashion:
    topic: hunt
    say:
      - text: "Fashion sets every price worth having, because a thing is only worth
               what someone far away has decided to want. The roads carry the wanting
               down here and the feathers back up, and disunity could never move a
               feather a hundred miles to a buyer still waiting on it. Order does
               that much for you. Keep hunting."
    options:
      - text: "Noted."
        goto: hub

  respect_hunt:
    topic: hunt
    say:
      - text: "That is real work, not bait-and-pray on swallows. Most who go that
               deep into the wood end up feeding it instead, and you walked back out,
               which is more than most. The empire could have used a hunter like you,
               once."
    options:
      - text: "High praise, from you."
        goto: hub
      - text: "It nearly used me up."
        goto: hub

  # ---------- Profession reads ----------
  respect_lumberjack:
    say:
      - text: "Honest work, timber, and you cannot fake a full cord the way you can
               fake most things people sell me. I cut my share of it once, back when
               a regiment shoed its own horses and felled its own wood. Keep at it."
    options:
      - text: "I will."
        goto: hub

  respect_enchanter:
    say:
      - text: "Enchanting is a discipline I can respect. Whatever the temple
               pretends, it is not prayer; it is knowing exactly what a thing does
               and then bending it on purpose, and the Sidaev understood that better
               than the priests ever will."
    options:
      - text: "Heresy, in the wrong company."
        goto: hub
      - text: "Noted."
        goto: hub

  needle_blacksmith:
    topic: forge
    say:
      - text: "A smith. I shod my own unit's horses and forged in the field while
               your trade was still apprenticed to the bellows, so do not look to me
               to be impressed by a hot bar and a hammer. Kethalis never managed it,
               and he is the best this town can field."
    options:
      - text: "You have a problem with smiths."
        goto: hub
      - text: "Noted."
        goto: hub

  # ---------- Wares: answer the question, then let them pull the thread ----------
  wares:
    topic: trade
    say:
      - text: "Depends what you hunt. Bait for the beast, and a blade you can trust.
               Past that, I keep a few things the forest never drops."
    options:
      - text: "A few things?"
        conditions: { sharedHistory: excludes saw_oddments }
        effects: { flag: saw_oddments }
        goto: oddments
      - text: "Just the basics, then."
        goto: hub
      - text: "I will take a look."
        goto: end

  oddments:
    topic: trade
    say:
      - text: "There is a banana on that shelf, for one. Bananas grow nowhere within
               a month's march of this forest."
    options:
      - text: "So how is it here?"
        goto: banana_roads
      - text: "Huh."
        goto: hub

  banana_roads:
    topic: trade
    say:
      - text: "Roads, and the soldiers who keep them open. The empire's two great
               works. The banana is only the proof that reaches your hand."
    options:
      - text: "Convenient, your empire."
        goto: hub
      - text: "Fair point."
        effects: { opinion: +1 }
        goto: hub

  # ---------- Purchase callback ----------
  shop_smalltalk:
    say:
      - text: "A permit, not a pile of bait. That was the point of it: you buy the
               thing once and you hunt forever, which is the empire's whole trick
               written small. Half of why it works is the paperwork nobody thanks
               it for."
    options:
      - text: "What else should I be carrying?"
        goto: wares
      - text: "Noted."
        goto: end

  # ---------- Low-stock business beat ----------
  low_stock:
    say:
      - text: "Hm. You are right, I am short on {lowStockItem}, but the next caravan
               will set that straight soon enough. Is there anything I do have that
               you want?"
    options:
      - text: "Show me."
        goto: hub
      - text: "I will come back."
        goto: end
