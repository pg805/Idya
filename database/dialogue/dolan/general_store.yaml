# Dolan - The Fifth Regiment General Store
# SAMPLE conversation tree (0.3.0 draft). Illustrates the system; copy is for
# review, not final. Voice + truth: docs/lore/dolan.md and docs/lore/voice.md.
# Spec: docs/npc-dialogue-system.md.
#
# Demonstrates: entry buckets, standing-tiered greetings, faction friction,
# recent-loss read, profession read, purchase callback, low-stock business beat,
# a trusted-gated war story, and a confidant-gated crack (locked for ~everyone).

npc: dolan

# First entry whose conditions all pass becomes the opening node.
entry:
  - node: first_meeting
    conditions: { metBefore: false }
  - node: cold_open
    conditions: { faction: town, opinion: "<=3" }
  - node: greet
    conditions: {}

nodes:

  # ---------- First contact ----------
  first_meeting:
    say:
      - text: "Salvus. A new face. This is the Fifth Regiment General Store, and it
               is mine. Buy if you came to buy. Move along if you didn't."
    options:
      - text: "Fifth Regiment?"
        effects: { familiarity: +1, flag: asked_about_service }
        goto: service_intro
      - text: "Salvus. I'm after a hunt. What have you got?"
        conditions: { faction: empire }
        effects: { opinion: +1 }
        goto: greet
      - text: "Just looking."
        goto: end

  # ---------- Cold open (town-leaning, low opinion) ----------
  cold_open:
    say:
      - text: "Hunter. You again. The counter is right there. I'll assume you came
               to buy something and not to talk."
    options:
      - text: "Maybe I came to talk."
        goto: politics
      - text: "To buy. That's all."
        effects: { opinion: +1 }
        goto: greet
      - text: "Forget it."
        goto: end

  # ---------- Default hub ----------
  greet:
    say:
      # Grumpy-day bark: a raw-mood flavor gate, independent of who you are.
      - text: "Hunter. It has been a trying day. Do me the courtesy of being brief."
        conditions: { mood: "<=2" }
        weight: 2
      - text: "{playerName}. What do you need?"                # warm, knows you
        conditions: { standing: confidant }
      - text: "{playerName}. Back again. What is it you need?"
        conditions: { standing: trusted }
      - text: "Hunter. Are you here to buy something, or to wear out my floorboards?"
        conditions: { opinion: "<5" }                          # compares effectiveOpinion
      - text: "Hunter. Take what you came for."
    options:
      - text: "Your shelf is looking light."
        conditions: { lowStock: true }
        goto: low_stock
      - text: "That permit is already earning its keep."        # purchase callback
        conditions: { recentPurchases: includes swallow_bait }
        effects: { opinion: +1 }
        goto: shop_smalltalk
      - text: "Felled a fair bit of timber lately."            # profession read
        conditions: { lumberjackRank: ">=5" }
        effects: { opinion: +1 }
        goto: respect_trade
      - text: "Tell me about the Fifth."
        conditions: { sharedHistory: includes asked_about_service }
        goto: service_story
      - text: "Rough stretch. Lost more than I won out there."
        conditions: { recentLosses: ">=2" }
        goto: losing
      - text: "This empire bleeds the town for taxes and calls it order."
        conditions: { faction: town }
        effects: { flag: pushed_politics }
        goto: politics
      - text: "Nothing today."
        goto: end

  # ---------- Service: the thread that opens him up ----------
  service_intro:
    say:
      - text: "Fifth Regiment. Twenty-six years under the standard. I made Vexillar
               before the end. You don't earn that by loitering in Sulku'it."
    options:
      - text: "Why come home, then?"
        effects: { familiarity: +1, flag: asked_why_back }
        goto: why_back
      - text: "Hm."
        goto: greet

  # Warmth buys the STORIES (successes). Trusted-gated.
  service_story:
    say:
      - text: "You want the whole of it? Sit, then. The Fifth held the Maddow
               crossing for three days against twice our number. The roads were
               good behind us, so the relief came through. That is what order buys
               you. Supply that shows up. A road still there in the morning."
        conditions: { standing: trusted }
      - text: "The Fifth held lines that mattered. Trade moved because we made it
               safe to move. That is the short version, and it is the one you get."
    options:
      # The CRACK. Almost nobody sees this. Gated on standing, not opinion.
      - text: "And the ones who didn't come back?"
        conditions: { standing: confidant, sharedHistory: excludes told_regret }
        effects: { flag: told_regret }
        goto: regret
      - text: "Sounds like you'd go back tomorrow."
        conditions: { standing: confidant }
        goto: road_not_taken
      - text: "Good of the empire."
        goto: greet

  # confidant-only: a genuine crack (see bible #3h)
  regret:
    say:
      - text: "Some of them I put in the ground where they fell. There are orders I
               would give again, and a few I am no longer certain were ever mine to
               give. I weigh the good against them. Most days the sum comes out
               right."
      - text: "Don't ask me their names. That is where I stop."
    options:
      - text: "I won't, then."
        effects: { opinion: +1 }
        goto: greet

  # confidant-only: the road not taken (bible #3g)
  road_not_taken:
    say:
      - text: "Go back? No. I am too old, and the army does not keep relics. Still,
               I wonder sometimes what I would have been if I had stayed. Padev,
               perhaps. Sons. Fendalok's chair. Don't repeat that."
    options:
      - text: "Your secret is kept."
        effects: { opinion: +1 }
        goto: greet

  why_back:
    say:
      - text: "When your mother falls ill, you help her. That is the honorable thing
               to do."
      - text: "There was nowhere else the army still needed an old man, in any case.
               Was there something you actually meant to buy?"
    options:
      - text: "Fair enough."
        goto: greet

  # ---------- Faction friction: dodge first, insult only if pushed ----------
  politics:
    say:
      - text: "That is not what you came in for. Did you come to trade, or to argue
               politics with an old soldier?"
    options:
      - text: "Debating. The empire's boot is heavy here."
        conditions: { sharedHistory: includes pushed_politics }
        effects: { opinion: -1, flag: mocked_the_empire }
        goto: politics_rebuke
      - text: "Buying. Forget I said it."
        goto: greet
      - text: "Forget it."
        goto: end

  politics_rebuke:
    say:
      - text: "Heavy. Then you have never seen what light looks like. I have. I have
               watched villages settle their disputes by opening a girl's throat
               over the dirt. This town is only chaos with the volume turned down:
               superstitious, filthy, and proud of both. That boot is the only
               reason you sleep soundly enough to resent it. Now then. The counter,
               or the door."
    options:
      - text: "The counter."
        goto: greet
      - text: "The door."
        goto: end

  # ---------- Recent losses: jab or grudging counsel by opinion ----------
  losing:
    say:
      - text: "Losing teaches faster than winning, if you let it. What is breaking
               down out there, your footwork or your nerve?"
        conditions: { opinion: ">=5" }
      - text: "Then bleed less, or bait smaller. The forest does not grade on
               effort, hunter."
    options:
      - text: "Footwork. They close before I'm set."
        conditions: { opinion: ">=5" }
        effects: { familiarity: +1 }
        goto: greet
      - text: "I'll manage."
        goto: greet

  # ---------- Profession respect (lumberjack) ----------
  respect_trade:
    say:
      - text: "Honest work, timber. Hard to fake a full cord. I cut my share of it
               once. A regiment shoes its own horses and fells its own wood. Keep
               at it."
    options:
      - text: "Will do."
        goto: greet

  # ---------- Purchase callback ----------
  shop_smalltalk:
    say:
      - text: "A permit, not a pile of bait. That was the point. Buy it once and
               hunt forever. Practical. The empire ran on paperwork like that."
    options:
      - text: "What else should I be carrying?"
        goto: greet
      - text: "Noted."
        goto: end

  # ---------- Low-stock business beat ----------
  low_stock:
    say:
      - text: "Hm. You're right. I am short on {lowStockItem}. The next caravan will
               set that straight. Is there anything I do have for you?"
    options:
      - text: "Show me."
        goto: greet
      - text: "I'll come back."
        goto: end
