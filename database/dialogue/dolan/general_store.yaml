# Dolan - The Fifth Regiment General Store
# Conversation tree (0.3.0). Voice + truth: docs/lore/dolan.md, docs/lore/voice.md.
# House style: no em dashes; concise but educated; vary the rhythm (do not stack
# short declaratives); full sentences over fragments.
#
# `greet` is the opener (entry only). Mid-conversation, sub-nodes return to `hub`,
# which borrows greet's option menu but speaks a short "anything else" bridge so
# he is not re-greeting you every turn.

npc: dolan

entry:
  - node: first_meeting
    conditions: { metBefore: false }
  - node: cold_open
    conditions: { faction: town, opinion: "<=3" }
  - node: greet
    conditions: {}

nodes:

  # ---------- First contact ----------
  first_meeting:
    say:
      - text: "Salvus. A new face. This is the Fifth Regiment General Store, and it
               is mine, so buy if you came to buy and move along if you did not."
    options:
      - text: "You carry yourself like a soldier."
        effects: { familiarity: +1, flag: asked_about_service }
        goto: service_intro
      - text: "Salvus. I am after a hunt. What do you keep?"
        conditions: { faction: empire }
        effects: { opinion: +1 }
        goto: wares
      - text: "Just looking."
        goto: end

  # ---------- Cold open (town-leaning, low opinion) ----------
  cold_open:
    say:
      - text: "Hunter. You again. The counter is right there, and I will assume you
               came to use it rather than to lecture me from across it."
    options:
      - text: "Maybe I came to talk."
        goto: politics
      - text: "To buy. That is all."
        effects: { opinion: +1 }
        goto: hub
      - text: "Forget it."
        goto: end

  # ---------- Opener hub ----------
  greet:
    say:
      - text: "Hunter. It has been a trying day, so do me the courtesy of being brief."
        conditions: { mood: "<=2" }
        weight: 2
      - text: "{playerName}. A fair day for once. What do you need?"
        conditions: { mood: ">=8" }
      - text: "{playerName}. Sit if you like. What is it you need?"
        conditions: { standing: confidant }
      - text: "{playerName}. Back again. What is it this time?"
        conditions: { standing: trusted }
      - text: "{playerName}. What can I get you?"
        conditions: { standing: regular }
      - text: "Hunter. Are you here to buy something, or only to wear out my floorboards?"
        conditions: { opinion: "<5" }
      - text: "Hunter. Take what you came for."
    options:
      - text: "Your shelf is looking light."
        conditions: { lowStock: true }
        goto: low_stock
      - text: "Brought down a fair few swallows out there."
        conditions: { recentHunts: includes lithkem_swallow }
        effects: { opinion: +1 }
        goto: swallow_feathers
      - text: "Put one of the glass children down in the deep wood."
        conditions: { recentHunts: includes child_of_sidaev }
        effects: { opinion: +1 }
        goto: respect_hunt
      - text: "Crossed the sulgovenath and walked away from it."
        conditions: { recentHunts: includes sulgovenath }
        effects: { opinion: +1 }
        goto: respect_hunt
      - text: "Rough stretch. I have lost more than I have won out there."
        conditions: { recentLosses: ">=2" }
        goto: losing
      - text: "That permit is already earning its keep."
        conditions: { recentPurchases: includes swallow_bait }
        effects: { opinion: +1 }
        goto: shop_smalltalk
      - text: "I have felled a fair bit of timber lately."
        conditions: { lumberjackRank: ">=5" }
        effects: { opinion: +1 }
        goto: respect_lumberjack
      - text: "I have been doing enchanting work."
        conditions: { enchanterRank: ">=5" }
        effects: { opinion: +1 }
        goto: respect_enchanter
      - text: "I have been at the forge myself, lately."
        conditions: { blacksmithRank: ">=5" }
        goto: needle_blacksmith
      - text: "Why is your store called the Fifth Regiment?"
        conditions: { sharedHistory: excludes asked_about_service }
        effects: { familiarity: +1, flag: asked_about_service }
        goto: service_intro
      - text: "Back to your old regiment."
        conditions: { sharedHistory: includes asked_about_service }
        goto: service_intro
      - text: "What is worth buying?"
        goto: wares
      - text: "This empire bleeds the town for taxes and calls it order."
        conditions: { faction: town }
        goto: politics
      - text: "Nothing today."
        goto: end

  # ---------- Return bridge -------------------------------------------------
  # Borrows greet's menu, but the line evolves from his view of you and the
  # topic you just left (lastTopic). Topic-aware lines are preferred; mood and
  # standing colour the rest; plain prompts are the fallback.
  hub:
    say:
      # After confiding something real, he shuts the door gently and moves on.
      - text: "That is enough of the old days. What did you actually come in for?"
        conditions: { lastTopic: confided }
      - text: "I have said more than I meant to. Was there something you needed?"
        conditions: { lastTopic: confided }
      # After politics: cooled, transactional.
      - text: "Now. Was there something you needed, or are we finished here?"
        conditions: { lastTopic: politics }
      - text: "That is the end of that subject. The counter is still open, at least."
        conditions: { lastTopic: politics }
      # After he opened up about the service: a rare, grudging near-warmth.
      - text: "Well. I have talked your ear half off. What is it you need?"
        conditions: { lastTopic: service }
      - text: "Enough of the old days. What did you actually come in for?"
        conditions: { lastTopic: service }
      - text: "That is enough soldiering for one visit. Go on, then."
        conditions: { lastTopic: service }
      # After the forge needle: still a little sharp.
      - text: "Enough about hammers. What else?"
        conditions: { lastTopic: forge }
      # After giving counsel.
      - text: "Take the advice or leave it. Was there anything else?"
        conditions: { lastTopic: counsel }
      # After a hunt he approves of: businesslike and pleased.
      - text: "Good hunting pays both of us. What else can I do for you?"
        conditions: { lastTopic: hunt }
      # Mood, regardless of subject.
      - text: "If there is more, out with it."
        conditions: { mood: "<=2" }
      - text: "What else? I have the patience for it today."
        conditions: { mood: ">=8" }
      # Standing colour for the people he actually knows.
      - text: "What else, {playerName}?"
        conditions: { standing: confidant }
      # Plain fallbacks (varied so it is not the same prompt each loop).
      - text: "Anything else?"
      - text: "What else do you need?"
      - text: "Go on, then."
      - text: "And?"
      - text: "Was there something else?"
      - text: "Speak, then."
      - text: "Something more, or are we through?"
    optionsFrom: greet

  # ========== SERVICE / WAR — the full-ideal vertical slice ==========
  # The template the other arcs get rebuilt against. Demonstrates: Dolan driving
  # turns (he asks YOU things and reads the answer), stance-tracking via flags
  # with later CALLBACKS (multi-flag `flags:` conditions), divergent branches
  # that don't just funnel back, varied beat length, line variants, and the
  # confidant cracks reacting to how you treated him.
  service_intro:
    topic: service
    say:
      # First visit (in_regiment unset): the full opener, by the side you took.
      - text: "Back to my soldiering days. You did not leave them alone last time
               either."
        conditions: { flags: { sided_empire: true, in_regiment: false } }
      - text: "The regiment again. You town-blind sorts always circle back to it."
        conditions: { flags: { defended_town: true, in_regiment: false } }
      - text: "Hah. My old company, from when I was a soldier. I made Vexillar
               before the end. Ask, if you are curious."
        conditions: { flags: { in_regiment: false, sided_empire: false, defended_town: false } }
      # Returns (in_regiment set by engaging once): short, varied prompts so
      # re-entry never re-delivers the opener.
      - text: "What else about the Fifth?"
        conditions: { flags: { in_regiment: true } }
      - text: "Go on. What else do you want from an old soldier?"
        conditions: { flags: { in_regiment: true } }
      - text: "More of the old days, then?"
        conditions: { flags: { in_regiment: true } }
      - text: "And? Out with it."
        conditions: { flags: { in_regiment: true } }
    options:
      - text: "What is a Vexillar?"
        conditions: { sharedHistory: excludes knows_vexillar }
        effects: { flag: [knows_vexillar, in_regiment] }
        goto: vexillar
      - text: "You fought for the empire your whole life?"
        conditions: { sharedHistory: excludes asked_military }
        effects: { flag: [asked_military, in_regiment] }
        goto: military_man
      - text: "You look Ketulvu yourself."
        conditions: { sharedHistory: excludes remarked_ketulvu }
        effects: { flag: [remarked_ketulvu, in_regiment] }
        goto: ketulvu_remark
      - text: "Tell me about a battle you fought."
        conditions: { standing: trusted, sharedHistory: excludes heard_war_story }
        effects: { flag: in_regiment }
        goto: war_open
      - text: "Do you ever wish you had stayed?"
        conditions: { standing: confidant, sharedHistory: excludes asked_road }
        effects: { flag: [asked_road, in_regiment] }
        goto: road_not_taken
      - text: "Why did you ever come back here?"
        conditions: { sharedHistory: excludes asked_why_back }
        effects: { familiarity: +1, flag: [asked_why_back, in_regiment] }
        goto: why_back
      - text: "Another time."
        goto: hub

  vexillar:
    topic: service
    say:
      - text: "The officer who carries the regiment's standard and answers for it.
               The line forms where the standard stands. I held mine a long while."
    options:
      - text: "That is a lot to answer for."
        effects: { flag: honored_service }
        goto: service_intro
      - text: "A glorified flag-bearer, then."
        effects: { opinion: -1, flag: mocked_service }
        goto: vexillar_jab
      - text: "Back to it."
        goto: service_intro

  vexillar_jab:
    topic: service
    say:
      - text: "Hah. Say that to the men who formed on that flag when the line was
               breaking. The ones still breathing, anyway. Mind your tongue."
    options:
      - text: "Fair. My mistake."
        effects: { opinion: +1 }
        goto: service_intro
      - text: "Touchy."
        effects: { opinion: -1 }
        goto: hub

  # NPC-DRIVEN: he turns the question back on you. Your answer sets a stance.
  military_man:
    topic: service
    say:
      - text:
          - "Twenty-six years. I have seen more of the empire than most men see of
             their own street."
          - "So tell me. Are you the sort who thinks all that marching was theft, or
             the sort who can see what it bought?"
    options:
      - text: "It bought roads, trade, order. I can see it."
        effects: { opinion: +1, flag: sided_empire }
        goto: empire_agree
      - text: "It bought boots on this town's neck."
        effects: { opinion: -1, flag: defended_town }
        goto: empire_disagree
      - text: "I have not decided."
        effects: { flag: noncommittal }
        goto: empire_neutral

  empire_agree:
    topic: service
    say:
      - text: "Good. Most who pass through only ever feel the tax, never the road
               under their feet that let them get here to complain about it."
    options:
      - text: "What did you mean, order?"
        conditions: { sharedHistory: excludes heard_order }
        effects: { flag: heard_order }
        goto: order_thread
      - text: "Back to it."
        goto: service_intro

  empire_disagree:
    topic: service
    say:
      - text: "Spoken like someone who has never once gone without the road. Keep
               your town-blindness if it comforts you. It is a luxury the empire
               paid for, same as the rest of what you take for granted."
    options:
      - text: "The town pays the taxes. That is no luxury."
        goto: empire_argue
      - text: "Maybe. I have never seen the other side of it."
        effects: { opinion: +1, flag: noncommittal }
        goto: order_thread
      - text: "Leave it."
        goto: hub

  empire_argue:
    topic: service
    say:
      - text: "You want to weigh the price of the road and never the road. I have
               walked countries with neither, where a strong man's mood was the only
               law a village got. Pray you never see one. The counter is still there
               when you are finished lecturing me."
    options:
      - text: "Enough. We are done here."
        goto: hub
      - text: "...All right. What was it like, a place with no law?"
        effects: { opinion: +1, flag: curious }
        goto: order_thread

  empire_neutral:
    topic: service
    say:
      - text: "Honest, at least. Most pretend a certainty they have not earned. Come
               back when you have decided. I will still be standing here."
    options:
      - text: "What did you mean, order?"
        conditions: { sharedHistory: excludes heard_order }
        effects: { flag: heard_order }
        goto: order_thread
      - text: "Back to it."
        goto: service_intro

  order_thread:
    topic: service
    say:
      - text: "A road a caravan crosses without an escort. Coin worth the same in
               two towns. You were born into it, so you cannot see it. I helped
               build it, one stretch at a time."
    options:
      - text: "And it was worth what it cost?"
        goto: order_cost
      - text: "Back to it."
        goto: service_intro

  order_cost:
    topic: service
    say:
      # Callback: leans on the side you took.
      - text: "You already know my answer, after the things you have said to me. Yes.
               Ask the men who can cross that road alive now."
        conditions: { flags: { defended_town: true } }
      - text: "Everything worth having costs. Yes. Ask the men who cross that road
               alive now, and were not so sure they would."
    options:
      - text: "Back to it."
        goto: service_intro

  ketulvu_remark:
    topic: service
    say:
      - text: "By blood. Not by anything that matters. I left that behind with the
               rest of what this town tried to make me."
    options:
      - text: "Your own people, though."
        goto: ketulvu_own
      - text: "But you came back to them."
        goto: ketulvu_back
      - text: "Back to it."
        goto: service_intro

  ketulvu_own:
    topic: service
    say:
      - text: "My people are whoever keeps the road open and the lamp lit. Blood is
               an accident. What a man chooses is the only part worth counting."
    options:
      - text: "And yet here you stand, among them."
        effects: { flag: pressed_ketulvu }
        goto: ketulvu_press
      - text: "Back to it."
        goto: service_intro

  ketulvu_press:
    topic: service
    say:
      - text: "Hah. Careful. You are starting to ask the questions I came home to
               stop asking. Leave it there."
    options:
      - text: "As you like."
        effects: { opinion: +1 }
        goto: service_intro

  ketulvu_back:
    topic: service
    say:
      - text: "For my mother. Not for them. Do not mistake the one for the other."
    options:
      - text: "Back to it."
        goto: service_intro

  # NPC-DRIVEN: he asks what you actually want from the story; the two answers
  # are genuinely different tellings.
  war_open:
    topic: service
    say:
      - text: "A battle. Hah. Do you want the blood of it or the meaning of it? They
               are not the same story, and I do not tell them the same way."
    options:
      - text: "The meaning."
        effects: { flag: heard_war_story }
        goto: war_meaning
      - text: "The blood."
        effects: { flag: heard_war_story }
        goto: war_blood
      - text: "Whichever you would rather tell."
        effects: { opinion: +1, flag: heard_war_story }
        goto: war_meaning

  war_meaning:
    topic: service
    say:
      # Callback if you defended the town earlier.
      - text: "You will not love the lesson, given what you think of the empire, but
               here it is. The Fifth held a river crossing three days because the
               road behind us held. Order is not a flag or a speech. It is the supply
               that arrives, and the bridge still there in the morning."
        conditions: { flags: { defended_town: true } }
      - text: "The Fifth held a river crossing three days against twice our number,
               because the road behind us held and the relief came up it. Order is
               not a flag or a speech. It is the supply that arrives, and the bridge
               still there in the morning."
    options:
      - text: "And the men who held it with you?"
        conditions: { standing: confidant, sharedHistory: excludes told_regret }
        effects: { flag: told_regret }
        goto: regret
      - text: "A soldier's idea of poetry."
        goto: service_intro

  war_blood:
    topic: service
    say:
      - text:
          - "The blood, then. The first hour you are certain you will die. The second
             hour you are too tired to care, and that is the hour you are dangerous."
          - "You do not fight for the empire when the line breaks. You fight for the
             man whose shoulder is against yours. The empire is what you remember it
             was for, afterward."
    options:
      - text: "And the men beside you?"
        conditions: { standing: confidant, sharedHistory: excludes told_regret }
        effects: { flag: told_regret }
        goto: regret
      - text: "Sounds like hell."
        effects: { opinion: +1 }
        goto: service_intro

  # CONFIDANT CRACK — opens differently depending on how you treated his service.
  regret:
    topic: confided
    say:
      - text:
          - "Some of them I put in the ground where they fell. I will give you their
             measure, since you have not made a joke of any of this."
          - "There are orders I would give again without blinking, and a few I am no
             longer sure were ever mine to give. I weigh the good against them, and
             most days it balances."
        conditions: { flags: { mocked_service: false } }
      - text: "Some of them I put in the ground where they fell. That is as much as
               you get, after the mouth you have had on you tonight. Do not ask for
               names."
        conditions: { flags: { mocked_service: true } }
    options:
      - text: "Thank you for telling me."
        conditions: { flags: { mocked_service: false } }
        effects: { opinion: +1, flag: honored_grief }
        goto: hub
      - text: "I will not ask for more."
        effects: { opinion: +1 }
        goto: hub

  # CONFIDANT CRACK — calls back your stance on the town directly.
  road_not_taken:
    topic: confided
    say:
      - text: "You think this place is worth defending. I have spent years deciding
               you are wrong. Some nights, watching the lamps come on one by one, I
               am less certain than I let on. I could have stayed. Been Padev. Had
               sons, and a name said kindly. Do not repeat that."
        conditions: { flags: { defended_town: true } }
      - text: "I am too old to go back, and the army does not keep relics. Still, I
               wonder some nights what I would have been if I had stayed. Padev,
               maybe. Sons. Fendalok's chair. Do not repeat that."
    options:
      - text: "Your secret is kept."
        effects: { opinion: +1 }
        goto: hub

  why_back:
    topic: service
    say:
      - text: "My mother fell ill. You go, when that happens. There was nowhere else
               the army still needed an old man anyway."
    options:
      - text: "Fair enough."
        goto: service_intro

  # ========== THE ARGUMENT LOOP — tension, not a path ==========
  # You can sit in this as long as you keep finding angles. `argue` and its
  # retorts escalate by conversation-local `heat`: the same topic, said sharper
  # each turn. Heat only drops when YOU release (concede / "forget it") or DOLAN
  # forces it at high heat. Aggressive lines +1 heat, conceding a point -1, a
  # release -10 (clamped to 0).
  politics:
    topic: politics
    say:
      - text: "That is not what you came in for. Did you come to trade, or to argue
               politics with an old soldier who has heard it all before?"
    options:
      - text: "To argue, if you have the stomach for it."
        effects: { heat: +1, flag: argued_empire }
        goto: argue
      - text: "To trade. Forget I said it."
        goto: hub
      - text: "Forget it."
        goto: end

  argue:
    topic: politics
    say:
      # Heat tiers: the prompt itself escalates, and at the top he moves to end it.
      - text: "We are going in circles and I am near the end of my patience for it.
               Say it once more if you must. Then it is the counter or the door, and
               I mean that."
        conditions: { heat: ">=5" }
      - text: "You keep worrying the same sore tooth. Fine. Out with the rest of it."
        conditions: { heat: ">=3" }
      - text: "Go on, then. Make your case against the empire. I have heard them all,
               but make it."
    options:
      - text: "The taxes are bleeding this town white."
        effects: { heat: +1 }
        goto: argue_taxes
      - text: "Your soldiers swagger like they own the place."
        effects: { heat: +1 }
        goto: argue_soldiers
      - text: "You traded your own gods for theirs."
        effects: { heat: +1 }
        goto: argue_gods
      # Release valves, always available.
      - text: "...You know what, maybe you have a point."
        effects: { opinion: +1, heat: -10, flag: conceded_empire }
        goto: argue_concede
      - text: "Forget it. We are done."
        effects: { heat: -10 }
        goto: hub
      # His way out, once it is hot enough for him to take it.
      - text: "Fine. The counter."
        conditions: { heat: ">=5" }
        effects: { heat: -10 }
        goto: hub

  argue_taxes:
    topic: politics
    say:
      - text: "The tax, the tax, always the tax. You would burn the road to spite the
               toll and then weep when no caravan comes up it. It is a child's
               argument, and you are not a child."
        conditions: { heat: ">=4" }
      - text: "The tax buys the road the tax came up on. You want the road for
               nothing. Nothing is for nothing. You are old enough to know that much."
    options:
      - text: "Convenient, for the man selling road-grown bananas."
        effects: { heat: +1 }
        goto: argue
      - text: "...fine. But the families here still go hungry."
        effects: { heat: -1 }
        goto: argue
      - text: "Forget it."
        effects: { heat: -10 }
        goto: hub

  argue_soldiers:
    topic: politics
    say:
      - text: "Swagger. You would rather they were timid? A timid garrison is a dead
               one, and a dead garrison is a burned town. You have no notion of what
               they hold back simply by standing there, bored, where you can resent
               them."
        conditions: { heat: ">=4" }
      - text: "They keep the road safe enough that you can resent them in comfort.
               Manners are a luxury of the protected, and you are very protected."
    options:
      - text: "Protected, or occupied?"
        effects: { heat: +1 }
        goto: argue
      - text: "...I had not thought of it from the wall's side."
        effects: { opinion: +1, heat: -1 }
        goto: argue
      - text: "Forget it."
        effects: { heat: -10 }
        goto: hub

  argue_gods:
    topic: politics
    say:
      - text: "My gods. The ones who never once made the trebuchet shot fly true,
               while a Chae engineer's arithmetic did it every time. I traded a
               prayer that changed nothing for a science that changes everything.
               Call it selling out. I would do it again twice before breakfast."
        conditions: { heat: ">=4" }
      - text: "I traded superstition for a thing that works. If your gods object,
               they are welcome to take it up with me directly. I will wait."
    options:
      - text: "Some things are not meant to be measured."
        effects: { heat: +1 }
        goto: argue
      - text: "...you are not wrong about the trebuchet."
        effects: { heat: -1 }
        goto: argue
      - text: "Forget it."
        effects: { heat: -10 }
        goto: hub

  argue_concede:
    topic: politics
    say:
      - text: "Hah. There it is. I will not pretend it is not satisfying to hear. We
               leave it there, then, before you find your nerve again."
    options:
      - text: "Leave it there."
        goto: hub

  # ---------- Recent losses: counsel or jab by opinion ----------
  losing:
    topic: counsel
    say:
      - text: "Losing teaches faster than winning ever will, if you let it. So tell
               me what is breaking down out there, your footwork or your nerve."
        conditions: { opinion: ">=5" }
      - text: "Then bleed a little less, or bait something smaller. The forest does
               not grade a man on effort, hunter."
    options:
      - text: "Footwork. They close before I am set."
        conditions: { opinion: ">=5" }
        effects: { familiarity: +1 }
        goto: footwork
      - text: "I will manage."
        goto: hub

  footwork:
    topic: counsel
    say:
      - text: "Then stop meeting them where they want to be met. Choose your ground
               before the fight starts instead of during it, because a line you
               picked is worth twice one you were forced onto. That was most of what
               command ever came down to."
    options:
      - text: "I will try it."
        effects: { opinion: +1 }
        goto: hub

  # ---------- Recent-hunt reads ----------
  swallow_feathers:
    topic: hunt
    say:
      - text: "Swallows. Good. Their feathers are worth more this season than the
               birds have any right to be, now that the Chae have decided plumes are
               in fashion again. You bring me feathers and we both eat, which is the
               only kind of sentiment I have ever trusted: the kind I can bank."
    options:
      - text: "Fashion sets the price?"
        goto: swallow_fashion
      - text: "I will keep them coming."
        effects: { opinion: +1 }
        goto: hub

  swallow_fashion:
    topic: hunt
    say:
      - text: "Fashion sets every price worth having, because a thing is only worth
               what someone far away has decided to want. The roads carry the wanting
               down here and the feathers back up, and disunity could never move a
               feather a hundred miles to a buyer still waiting on it. Order does
               that much for you. Keep hunting."
    options:
      - text: "Noted."
        goto: hub

  respect_hunt:
    topic: hunt
    say:
      - text: "That is real work, not bait-and-pray on swallows. Most who go that
               deep into the wood end up feeding it instead, and you walked back out,
               which is more than most. The empire could have used a hunter like you,
               once."
    options:
      - text: "High praise, from you."
        goto: hub
      - text: "It nearly used me up."
        goto: hub

  # ---------- Profession reads ----------
  respect_lumberjack:
    say:
      - text: "Honest work, timber, and you cannot fake a full cord the way you can
               fake most things people sell me. I cut my share of it once, back when
               a regiment shoed its own horses and felled its own wood. Keep at it."
    options:
      - text: "I will."
        goto: hub

  respect_enchanter:
    say:
      - text: "Enchanting is a discipline I can respect. Whatever the temple
               pretends, it is not prayer; it is knowing exactly what a thing does
               and then bending it on purpose, and the Sidaev understood that better
               than the priests ever will."
    options:
      - text: "Heresy, in the wrong company."
        goto: hub
      - text: "Noted."
        goto: hub

  needle_blacksmith:
    topic: forge
    say:
      - text: "A smith. I shod my own unit's horses and forged in the field while
               your trade was still apprenticed to the bellows, so do not look to me
               to be impressed by a hot bar and a hammer. Kethalis never managed it,
               and he is the best this town can field."
    options:
      - text: "You have a problem with smiths."
        goto: hub
      - text: "Noted."
        goto: hub

  # ---------- Wares: answer the question, then let them pull the thread ----------
  wares:
    topic: trade
    say:
      - text: "Depends what you hunt. Bait for the beast, and a blade you can trust.
               Past that, I keep a few things the forest never drops."
    options:
      - text: "A few things?"
        conditions: { sharedHistory: excludes saw_oddments }
        effects: { flag: saw_oddments }
        goto: oddments
      - text: "Just the basics, then."
        goto: hub
      - text: "I will take a look."
        goto: end

  oddments:
    topic: trade
    say:
      - text: "There is a banana on that shelf, for one. Bananas grow nowhere within
               a month's march of this forest."
    options:
      - text: "So how is it here?"
        goto: banana_roads
      - text: "Huh."
        goto: hub

  banana_roads:
    topic: trade
    say:
      - text: "Roads, and the soldiers who keep them open. The empire's two great
               works. The banana is only the proof that reaches your hand."
    options:
      - text: "Convenient, your empire."
        goto: hub
      - text: "Fair point."
        effects: { opinion: +1 }
        goto: hub

  # ---------- Purchase callback ----------
  shop_smalltalk:
    say:
      - text: "A permit, not a pile of bait. That was the point of it: you buy the
               thing once and you hunt forever, which is the empire's whole trick
               written small. Half of why it works is the paperwork nobody thanks
               it for."
    options:
      - text: "What else should I be carrying?"
        goto: wares
      - text: "Noted."
        goto: end

  # ---------- Low-stock business beat ----------
  low_stock:
    say:
      - text: "Hm. You are right, I am short on {lowStockItem}, but the next caravan
               will set that straight soon enough. Is there anything I do have that
               you want?"
    options:
      - text: "Show me."
        goto: hub
      - text: "I will come back."
        goto: end
