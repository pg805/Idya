# Dolan - The Fifth Regiment General Store
# Conversation tree (0.3.0). Voice + truth: docs/lore/dolan.md, docs/lore/voice.md.
# Spec: docs/npc-dialogue-system.md. House style: no em dashes; concise but
# educated; full sentences over fragments.
#
# Buckets: standing-tiered + mood greetings, service arc (-> war story -> cracks),
# politics (dodge -> push -> rebuke), profession reads (lumberjack/enchanter nod,
# blacksmith needle), recent-hunt reads (swallow feathers, deep-wood respect),
# recent-loss read, purchase callback, wares pitch, low-stock beat.

npc: dolan

entry:
  - node: first_meeting
    conditions: { metBefore: false }
  - node: cold_open
    conditions: { faction: town, opinion: "<=3" }
  - node: greet
    conditions: {}

nodes:

  # ---------- First contact ----------
  first_meeting:
    say:
      - text: "Salvus. A new face. This is the Fifth Regiment General Store, and it
               is mine. Buy if you came to buy, and move along if you did not."
    options:
      - text: "You carry yourself like a soldier."
        effects: { familiarity: +1, flag: asked_about_service }
        goto: service_intro
      - text: "Salvus. I am after a hunt. What do you keep?"
        conditions: { faction: empire }
        effects: { opinion: +1 }
        goto: wares
      - text: "Just looking."
        goto: end

  # ---------- Cold open (town-leaning, low opinion) ----------
  cold_open:
    say:
      - text: "Hunter. You again. The counter is right there. I will assume you came
               to buy something and not to lecture me about it."
    options:
      - text: "Maybe I came to talk."
        goto: politics
      - text: "To buy. That is all."
        effects: { opinion: +1 }
        goto: greet
      - text: "Forget it."
        goto: end

  # ---------- Default hub ----------
  greet:
    say:
      - text: "Hunter. It has been a trying day. Do me the courtesy of being brief."
        conditions: { mood: "<=2" }
        weight: 2
      - text: "{playerName}. A fair day, for once. What do you need?"
        conditions: { mood: ">=8" }
      - text: "{playerName}. Sit if you like. What is it you need?"
        conditions: { standing: confidant }
      - text: "{playerName}. Back again. What is it you need?"
        conditions: { standing: trusted }
      - text: "{playerName}. What can I get you?"
        conditions: { standing: regular }
      - text: "Hunter. Are you here to buy something, or to wear out my floorboards?"
        conditions: { opinion: "<5" }
      - text: "Hunter. Take what you came for."
    options:
      - text: "Your shelf is looking light."
        conditions: { lowStock: true }
        goto: low_stock
      - text: "Brought down a fair few swallows out there."
        conditions: { recentHunts: includes lithkem_swallow }
        effects: { opinion: +1 }
        goto: swallow_feathers
      - text: "Put one of the glass children down in the deep wood."
        conditions: { recentHunts: includes child_of_sidaev }
        effects: { opinion: +1 }
        goto: respect_hunt
      - text: "Crossed the sulgovenath and walked away from it."
        conditions: { recentHunts: includes sulgovenath }
        effects: { opinion: +1 }
        goto: respect_hunt
      - text: "Rough stretch. I have lost more than I have won out there."
        conditions: { recentLosses: ">=2" }
        goto: losing
      - text: "That permit is already earning its keep."
        conditions: { recentPurchases: includes swallow_bait }
        effects: { opinion: +1 }
        goto: shop_smalltalk
      - text: "I have felled a fair bit of timber lately."
        conditions: { lumberjackRank: ">=5" }
        effects: { opinion: +1 }
        goto: respect_lumberjack
      - text: "I have been doing enchanting work."
        conditions: { enchanterRank: ">=5" }
        effects: { opinion: +1 }
        goto: respect_enchanter
      - text: "I have been at the forge myself, lately."
        conditions: { blacksmithRank: ">=5" }
        goto: needle_blacksmith
      - text: "Tell me about the Fifth."
        conditions: { sharedHistory: includes asked_about_service }
        goto: service_story
      - text: "What is worth buying?"
        goto: wares
      - text: "This empire bleeds the town for taxes and calls it order."
        conditions: { faction: town }
        goto: politics
      - text: "Nothing today."
        goto: end

  # ---------- Service: the thread that opens him up ----------
  service_intro:
    say:
      - text: "Fifth Regiment. Twenty-six years under the standard. I made Vexillar
               before the end. You do not earn that by loitering in Sulku'it."
    options:
      - text: "Why come home, then?"
        effects: { familiarity: +1, flag: asked_why_back }
        goto: why_back
      - text: "What is a Vexillar?"
        goto: vexillar
      - text: "Hm."
        goto: greet

  vexillar:
    say:
      - text: "The officer who carries a regiment's standard and answers for it. The
               line forms where the standard stands. You hold that, or you hold
               nothing. I held mine for a long time."
    options:
      - text: "Understood."
        goto: greet

  # Warmth buys the STORIES (successes). Trusted-gated.
  service_story:
    say:
      - text: "You want the whole of it? Sit, then. The Fifth held the Maddow
               crossing for three days against twice our number. The roads were
               good behind us, so the relief came through. That is what order buys
               you. Supply that shows up. A road still there in the morning."
        conditions: { standing: trusted }
      - text: "The Fifth held lines that mattered. Trade moved because we made it
               safe to move. That is the short version, and it is the one you get."
    options:
      - text: "And the ones who did not come back?"
        conditions: { standing: confidant, sharedHistory: excludes told_regret }
        effects: { flag: told_regret }
        goto: regret
      - text: "Sounds like you would go back tomorrow."
        conditions: { standing: confidant }
        goto: road_not_taken
      - text: "Good of the empire."
        goto: greet

  # confidant-only: a genuine crack (bible #3h)
  regret:
    say:
      - text:
          - "Some of them I put in the ground where they fell. There are orders I
             would give again, and a few I am no longer certain were ever mine to
             give. I weigh the good against them. Most days the sum comes out right."
          - "Do not ask me their names. That is where I stop."
    options:
      - text: "I will not, then."
        effects: { opinion: +1 }
        goto: greet

  # confidant-only: the road not taken (bible #3g)
  road_not_taken:
    say:
      - text: "Go back? No. I am too old, and the army does not keep relics. Still,
               I wonder sometimes what I would have been if I had stayed. Padev,
               perhaps. Sons. Fendalok's chair. Do not repeat that."
    options:
      - text: "Your secret is kept."
        effects: { opinion: +1 }
        goto: greet

  why_back:
    say:
      - text:
          - "When your mother falls ill, you help her. That is the honorable thing
             to do."
          - "There was nowhere else the army still needed an old man, in any case.
             Was there something you actually meant to buy?"
    options:
      - text: "Fair enough."
        goto: greet

  # ---------- Faction friction: dodge first, insult only if pushed ----------
  politics:
    say:
      - text: "That is not what you came in for. Did you come to trade, or to argue
               politics with an old soldier?"
    options:
      - text: "Debating. The empire's boot is heavy here."
        effects: { opinion: -1, flag: mocked_the_empire }
        goto: politics_rebuke
      - text: "Buying. Forget I said it."
        goto: greet
      - text: "Forget it."
        goto: end

  politics_rebuke:
    say:
      - text: "Heavy. Then you have never seen what light looks like. I have. I have
               watched villages settle their disputes by opening a girl's throat
               over the dirt. This town is only chaos with the volume turned down:
               superstitious, filthy, and proud of both. That boot is the only
               reason you sleep soundly enough to resent it. Now then. The counter,
               or the door."
    options:
      - text: "The counter."
        goto: greet
      - text: "The door."
        goto: end

  # ---------- Recent losses: counsel or jab by opinion ----------
  losing:
    say:
      - text: "Losing teaches faster than winning, if you let it. What is breaking
               down out there, your footwork or your nerve?"
        conditions: { opinion: ">=5" }
      - text: "Then bleed less, or bait smaller. The forest does not grade on
               effort, hunter."
    options:
      - text: "Footwork. They close before I am set."
        conditions: { opinion: ">=5" }
        effects: { familiarity: +1 }
        goto: footwork
      - text: "I will manage."
        goto: greet

  footwork:
    say:
      - text: "Then stop meeting them where they want to meet you. Pick your ground
               before the fight, not during it. A line you choose is worth twice
               one you are forced onto. That is most of what command ever was."
    options:
      - text: "I will try it."
        effects: { opinion: +1 }
        goto: greet

  # ---------- Recent-hunt reads ----------
  swallow_feathers:
    say:
      - text: "Swallows. Good. Their feathers are worth more this season than the
               birds have any right to be. The Chae have decided plumes are fashion
               again, so you bring me feathers and we both eat. Sentiment I can
               bank is the only kind I trust."
    options:
      - text: "Fashion sets the price?"
        goto: swallow_fashion
      - text: "I will keep them coming."
        effects: { opinion: +1 }
        goto: greet

  swallow_fashion:
    say:
      - text: "Fashion sets every price worth having. A thing is worth what someone
               far away has decided to want. The roads carry the wanting here, and
               the feathers back. Disunity could never move a feather a hundred
               miles and find a buyer waiting. Order does that. Keep hunting."
    options:
      - text: "Noted."
        goto: greet

  respect_hunt:
    say:
      - text: "That is real work, not bait-and-pray on swallows. Most who go that
               deep into the wood feed it instead. You walked back out. The empire
               could have used you, once."
    options:
      - text: "High praise, from you."
        goto: greet
      - text: "It nearly used me up."
        goto: greet

  # ---------- Profession reads ----------
  respect_lumberjack:
    say:
      - text: "Honest work, timber. Hard to fake a full cord. I cut my share of it
               once. A regiment shoes its own horses and fells its own wood. Keep
               at it."
    options:
      - text: "I will."
        goto: greet

  respect_enchanter:
    say:
      - text: "Enchanting. There is a discipline I can respect. Whatever the temple
               pretends, it is not prayer. It is knowing exactly what a thing does
               and bending it on purpose. The Sidaev understood that better than the
               priests ever will."
    options:
      - text: "You sound like a believer."
        goto: greet
      - text: "Noted."
        goto: greet

  needle_blacksmith:
    say:
      - text: "A smith. I shod my own unit's horses and forged in the field while
               your trade was still apprenticed to the bellows. Do not look for me
               to be impressed by a hot bar and a hammer. Kethalis is not impressed
               either, and he is the best this town can manage."
    options:
      - text: "You have a problem with smiths."
        goto: greet
      - text: "Noted."
        goto: greet

  # ---------- Wares pitch / empire goods ----------
  wares:
    say:
      - text: "Caravans, mostly. I carry what the town cannot make and what the
               forest will not drop. There is a banana on that shelf. Bananas grow
               nowhere within a month's march of here. You are welcome to it, and to
               the roads and the soldiers that put it there."
    options:
      - text: "The empire brought a banana."
        goto: greet
      - text: "Anything fresh in?"
        goto: greet
      - text: "Just browsing."
        goto: end

  # ---------- Purchase callback ----------
  shop_smalltalk:
    say:
      - text: "A permit, not a pile of bait. That was the point. Buy it once and
               hunt forever. Practical. The empire ran on paperwork like that, and
               the paperwork is half of why it works."
    options:
      - text: "What else should I be carrying?"
        goto: wares
      - text: "Noted."
        goto: end

  # ---------- Low-stock business beat ----------
  low_stock:
    say:
      - text: "Hm. You are right. I am short on {lowStockItem}. The next caravan
               will set that straight. Is there anything I do have for you?"
    options:
      - text: "Show me."
        goto: greet
      - text: "I will come back."
        goto: end
