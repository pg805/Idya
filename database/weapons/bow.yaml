Name: Bow
Description: A simple bow strung with sulwood. Keeps enemies at a distance, but you'll need to watch your quiver.
Level: 3
HP: 25
Weight: 0

Resource:
  Name: Quiver
  Max: 10

Defend:
  - Name: Reload
    Type: 2
    Type_Name: Block
    Damage_Type: Physical
    Damage_Subtype: Mental
    Value: 0
    Cost: -10
