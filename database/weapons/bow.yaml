  - Name: Triple Shot
    Type: 1
    Type_Name: Strike
    Damage_Type: Physical
    Damage_Subtype: Sharp
    Field: [0, 1, 2, 3, 6, 9, 15, 21, 30]
    Cost: 3
    Aimed: false
    Range: 3
