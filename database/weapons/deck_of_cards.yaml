Name: Deck of Cards
Description: The cards in this deck are razor sharp and fly with precision. An worthy weapon for any adventurer.
Level: 1
HP: 15
Weight: 0

Resource:
  Name: Luck
  Max: 7

Defend:
  - Name: Shuffle
    Type: 2
    Type_Name: Block
    Damage_Type: Arcane
    Damage_Subtype: Blunt
    Value: 4
    Cost: -15  # restores 15 luck
    Action_String: "<User> shuffles their deck, preparing to block."

Defend Crit:
  - Name: Stack the Deck
    Type: 8
    Type_Name: Shield
    Damage_Type: Arcane
    Damage_Subtype: Blunt
    Value: 3
    Rounds: 3
    Cost: 0
    Action_String: "<User> stacks the deck, raising a shield."

Attack:
  - Name: Rank
    Type: 1
    Type_Name: Strike
    Damage_Type: Physical
    Damage_Subtype: Sharp
    Field: [2, 3, 4, 5, 6, 7, 8, 9, 10, 10, 10, 10, 11]
    Cost: 2  # costs 2 luck
    Aimed: false
    Range: 3
    Action_String: "<User> pulls a card and throws it at <Target>."
  - Name: Ace
    Type: 1
    Type_Name: Strike
    Damage_Type: Arcane
    Damage_Subtype: Sharp
    Field: [11]
    Cost: 4  # costs 4 luck
    Aimed: true
    Range: 3
    Action_String: "<User> pulls an ace and throws it at <Target>."

Attack Crit:
  - Name: Joker
    Type: 5
    Type_Name: Debuff
    Damage_Type: Arcane
    Damage_Subtype: Mental
    Value: 2
    Rounds: 2
    Action_String: "<User> pulls a joker and throws it at <Target>, fouling their aim."

Special:
  - Name: Suit
    Type: 1
    Type_Name: Strike
    Damage_Type: Physical
    Damage_Subtype: Sharp
    Field: [1, 12, 17, 22]
    Cost: 4  # costs 4 luck
    Aimed: false
    Range: 3
    Action_String: "<User> pulls a suit card and throws it at <Target>."
  - Name: Spades
    Type: 1
    Type_Name: Strike
    Damage_Type: Arcane
    Damage_Subtype: Sharp
    Field: [22]
    Cost: 7  # costs all luck
    Aimed: true
    Range: 3
    Action_String: "<User> pulls the ace of spades and throws it at <Target>."

Special Crit:
  - Name: Second Joker
    Type: 4
    Type_Name: DOT
    Damage_Type: Arcane
    Damage_Subtype: Sharp
    Field: [1, 2]
    Rounds: 2
    Cost: 0
    Action_String: "<User> slips in a second joker — <Target> bleeds."
