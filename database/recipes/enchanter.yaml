recipes:
  # L1 weapons use raw tier-1; L2/L3 use smelted tier-2 (hiruos), which also
  # drops from stronger enemies (farm fewer as you get stronger).
  # Cost in raw-equivalent: L1 = 12, L2 = 100 (10 tier-2), L3 = 200 (10+10).

  - id: en_deck_of_cards
    name: Deck of Cards
    description: "Bind a deck of cards with arcane edge — each card a weapon with its own potential."
    profession: enchanter
    required_level: 1
    ingredients:
      - item_id: thuvel
        quantity: 12
      - item_id: card_deck
        quantity: 1
    output:
      type: weapon
      id: deck_of_cards

  - id: en_hiruos
    name: Hiruos
    description: "Distill raw thuvel into refined hiruos — the enchanter's working material."
    profession: enchanter
    required_level: 2
    ingredients:
      - item_id: thuvel
        quantity: 10
    output:
      type: item
      id: hiruos
      quantity: 1

  - id: en_spellbook
    name: Spellbook
    description: "Bind enchanted pages around refined hiruos — a focus for arcane knowledge."
    profession: enchanter
    required_level: 3
    ingredients:
      - item_id: hiruos
        quantity: 10
    output:
      type: weapon
      id: spellbook

  - id: en_mental_cage
    name: Mental Cage
    description: "Weave a psychic lattice from refined hiruos — fits the mind like a helmet, cuts like a blade."
    profession: enchanter
    required_level: 3
    ingredients:
      - item_id: hiruos
        quantity: 10
    output:
      type: weapon
      id: mental_cage

  # Hybrid (talamite rod + arcane attunement). Needs a smith's talamite too.
  - id: en_wand
    name: Wand
    description: "Attune a talamite rod to the elements — fire, water, earth, and wind answer the call."
    profession: enchanter
    required_level: 5
    ingredients:
      - item_id: wand_base
        quantity: 1
      - item_id: hiruos
        quantity: 10
    output:
      type: weapon
      id: wand

  # Cross-profession component: the enchanter's half of the lumberjack's Kustaff.
  - id: en_staff_base
    name: Staff Base
    description: "Wind a hiruos-charged core into a balanced staff shaft — bound with living vines by a lumberjack into a kustaff."
    profession: enchanter
    required_level: 5
    ingredients:
      - item_id: hiruos
        quantity: 10
    output:
      type: item
      id: staff_base
      quantity: 1

  - id: en_nodol
    name: Nodol
    description: "Crystallize hiruos under sustained arcane pressure to produce nodol — the rarest enchanting material."
    profession: enchanter
    required_level: 7
    ingredients:
      - item_id: hiruos
        quantity: 12
    output:
      type: item
      id: nodol
      quantity: 1

  # L4 cross-profession component (R9): the enchanter's half of the lumberjack's Crossbow.
  - id: en_magic_bolts
    name: Magic Bolts
    description: "Cap a quiver of bolts with nodol and bind a bursting charge to each — they fly true and detonate on contact."
    profession: enchanter
    required_level: 9
    ingredients:
      - item_id: nodol
        quantity: 2
    output:
      type: item
      id: magic_bolts
      quantity: 1

  # L4 cross-profession component (R9): the enchanter's half of the smith's Nunchaku.
  - id: en_sidaev_bar
    name: Sidaev Bar
    description: "Attune a bar of nodol until Sidaev runs through it like water — one of the twin bars of a smith's nunchaku."
    profession: enchanter
    required_level: 9
    ingredients:
      - item_id: nodol
        quantity: 2
    output:
      type: item
      id: sidaev_bar
      quantity: 1

  # L4 weapon (R9): an enchanter's scythe — a smith's head, a lumberjack's haft, bound with nodol and Noko.
  - id: en_scythe
    name: Scythe
    description: "Bind a smith's curved head to a lumberjack's balanced haft and channel nodol through the spine — a reaping scythe that hums with Noko."
    profession: enchanter
    required_level: 9
    ingredients:
      - item_id: scythe_head
        quantity: 1
      - item_id: scythe_handle
        quantity: 1
      - item_id: nodol
        quantity: 2
    output:
      type: weapon
      id: scythe

  # ── Enchants are NOT recipes (0.2.0 rework) ──────────────────────────────────
  # The four enchant types (health / Sidaev Strike / Sidaev Pulse / Upgrade) are
  # applied directly via the Enchant page (/api/enchant), not crafted. Gating:
  # Enchanter rank ≥ 2× the weapon level (L1 at R2 … L5 at R10); cost scales with
  # weapon level (hiruos for L1-3, nodol for L4-5). See enchant_service.ts.
