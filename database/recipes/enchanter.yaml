recipes:
  # L1 weapons use raw tier-1; L2/L3 use smelted tier-2 (hiruos), which also
  # drops from stronger enemies (farm fewer as you get stronger).
  # Cost in raw-equivalent: L1 = 12, L2 = 100 (10 tier-2), L3 = 200 (10+10).

  - id: en_deck_of_cards
    name: Deck of Cards
    description: "Bind a deck of cards with arcane edge — each card a weapon with its own potential."
    profession: enchanter
    required_level: 1
    ingredients:
      - item_id: thuvel
        quantity: 12
      - item_id: card_deck
        quantity: 1
    output:
      type: weapon
      id: deck_of_cards

  - id: en_hiruos
    name: Hiruos
    description: "Distill raw thuvel into refined hiruos — the enchanter's working material."
    profession: enchanter
    required_level: 2
    ingredients:
      - item_id: thuvel
        quantity: 10
    output:
      type: item
      id: hiruos
      quantity: 1

  - id: en_spellbook
    name: Spellbook
    description: "Bind enchanted pages around refined hiruos — a focus for arcane knowledge."
    profession: enchanter
    required_level: 3
    ingredients:
      - item_id: hiruos
        quantity: 10
    output:
      type: weapon
      id: spellbook

  - id: en_mental_cage
    name: Mental Cage
    description: "Weave a psychic lattice from refined hiruos — fits the mind like a helmet, cuts like a blade."
    profession: enchanter
    required_level: 3
    ingredients:
      - item_id: hiruos
        quantity: 10
    output:
      type: weapon
      id: mental_cage

  # Hybrid (talamite rod + arcane attunement). Needs a smith's talamite too.
  - id: en_wand
    name: Wand
    description: "Attune a talamite rod to the elements — fire, water, earth, and wind answer the call."
    profession: enchanter
    required_level: 5
    ingredients:
      - item_id: talamite
        quantity: 10
      - item_id: hiruos
        quantity: 10
    output:
      type: weapon
      id: wand

  - id: en_nodol
    name: Nodol
    description: "Crystallize hiruos under sustained arcane pressure to produce nodol — the rarest enchanting material."
    profession: enchanter
    required_level: 7
    ingredients:
      - item_id: hiruos
        quantity: 12
    output:
      type: item
      id: nodol
      quantity: 1

  # ── Enchants (applied directly to a weapon you own) ─────────────────────────

  - id: en_enchant_physical_minor
    name: Physical Enchant
    description: "Imbue one action with physical force — sharp edge or blunt weight. Applied directly to a weapon you own."
    profession: enchanter
    required_level: 4
    ingredients:
      - item_id: thuvel
        quantity: 3
      - item_id: hiruos
        quantity: 6
    output:
      type: enchant
      kind: minor
      category: physical

  - id: en_enchant_arcane_minor
    name: Arcane Enchant
    description: "Imbue one action with arcane resonance — mental pressure or pure force. Applied directly to a weapon you own."
    profession: enchanter
    required_level: 5
    ingredients:
      - item_id: thuvel
        quantity: 3
      - item_id: hiruos
        quantity: 6
    output:
      type: enchant
      kind: minor
      category: arcane

  - id: en_enchant_elemental_minor
    name: Elemental Enchant
    description: "Imbue one action with elemental energy — fire, water, earth, wind, or plant. Applied directly to a weapon you own."
    profession: enchanter
    required_level: 6
    ingredients:
      - item_id: thuvel
        quantity: 3
      - item_id: hiruos
        quantity: 6
    output:
      type: enchant
      kind: minor
      category: elemental

  - id: en_enchant_physical_major
    name: Physical Enchant (Major)
    description: "Reforge an action's essence as physical — changes both type and subtype, adds +3. Applied directly to a weapon you own."
    profession: enchanter
    required_level: 8
    ingredients:
      - item_id: thuvel
        quantity: 3
      - item_id: hiruos
        quantity: 6
      - item_id: nodol
        quantity: 9
    output:
      type: enchant
      kind: major
      category: physical

  - id: en_enchant_arcane_major
    name: Arcane Enchant (Major)
    description: "Reforge an action's essence as arcane — changes both type and subtype, adds +3. Applied directly to a weapon you own."
    profession: enchanter
    required_level: 9
    ingredients:
      - item_id: thuvel
        quantity: 3
      - item_id: hiruos
        quantity: 6
      - item_id: nodol
        quantity: 9
    output:
      type: enchant
      kind: major
      category: arcane

  - id: en_enchant_elemental_major
    name: Elemental Enchant (Major)
    description: "Reforge an action's essence as elemental — changes both type and subtype, adds +3. Applied directly to a weapon you own."
    profession: enchanter
    required_level: 10
    ingredients:
      - item_id: thuvel
        quantity: 3
      - item_id: hiruos
        quantity: 6
      - item_id: nodol
        quantity: 9
    output:
      type: enchant
      kind: major
      category: elemental
