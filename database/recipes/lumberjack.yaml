recipes:
  - id: lj_branch
    name: Branch
    description: "Trim a decent branch into a proper fighting club."
    profession: lumberjack
    required_level: 1
    ingredients:
      - item_id: wood
        quantity: 3
    output:
      type: weapon
      id: branch

  - id: lj_quarterstaff
    name: Quarterstaff
    description: "Shape a long, balanced length of sulwood into a fighting staff."
    profession: lumberjack
    required_level: 1
    ingredients:
      - item_id: wood
        quantity: 8
    output:
      type: weapon
      id: quarterstaff

  - id: lj_sulwood_plank
    name: Sulwood Plank
    description: "Mill raw wood into a workable plank of sulwood."
    profession: lumberjack
    required_level: 2
    ingredients:
      - item_id: wood
        quantity: 3
    output:
      type: item
      id: sulwood_plank
      quantity: 1

  - id: lj_bow
    name: Sulwood Bow
    description: "Bend a sulwood stave into a bow and string it with treated fiber."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: sulwood_plank
        quantity: 4
    output:
      type: weapon
      id: bow

  - id: lj_sword_wood
    name: Sulwood Sword
    description: "Carve and harden a sulwood blade — crude but holds an edge."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: sulwood_plank
        quantity: 6
    output:
      type: weapon
      id: sword_wood

  - id: lj_axe_wood
    name: Sulwood Axe
    description: "Split a sulwood plank to a rough edge and lash it to a haft."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: sulwood_plank
        quantity: 5
    output:
      type: weapon
      id: axe_wood

  - id: lj_wand
    name: Sulwood Wand
    description: "Shape a slender sulwood rod — blank until attuned by an enchanter."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: sulwood_plank
        quantity: 4
    output:
      type: weapon
      id: wand

  - id: lj_shovel_handle
    name: Shovel Handle
    description: "Carve a sturdy handle from raw wood. One step toward a real shovel."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: wood
        quantity: 5
    output:
      type: item
      id: shovel_handle
      quantity: 1
