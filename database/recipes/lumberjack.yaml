recipes:
  # Flat material -> weapon (intermediary smelting/components deferred — to be
  # re-added later by breaking these totals into parts). Cost curve: L1 = 12,
  # L2 = 100, L3 = 200 base material.

  - id: lj_axe_wood
    name: Sulwood Axe
    description: "Shape and edge a heavy sulwood axe."
    profession: lumberjack
    required_level: 1
    ingredients:
      - item_id: sulwood
        quantity: 12
    output:
      type: weapon
      id: axe_wood

  - id: lj_sword_wood
    name: Sulwood Sword
    description: "Carve and harden a well-balanced sulwood blade."
    profession: lumberjack
    required_level: 2
    ingredients:
      - item_id: sulwood
        quantity: 100
    output:
      type: weapon
      id: sword_wood

  - id: lj_shovel_wood
    name: Sulwood Shovel
    description: "A solid sulwood shovel — works better as a weapon than it looks."
    profession: lumberjack
    required_level: 2
    ingredients:
      - item_id: sulwood
        quantity: 100
    output:
      type: weapon
      id: shovel_wood
