recipes:
  - id: lj_quarterstaff
    name: Quarterstaff
    description: "Shape a long, balanced length of sulwood into a fighting staff."
    profession: lumberjack
    required_level: 1
    ingredients:
      - item_id: sulwood
        quantity: 4
    output:
      type: weapon
      id: quarterstaff

  - id: lj_treated_sulwood
    name: Treated Sulwood
    description: "Cure raw sulwood with resin and heat, producing a denser, more workable material."
    profession: lumberjack
    required_level: 2
    ingredients:
      - item_id: sulwood
        quantity: 2
    output:
      type: item
      id: treated_sulwood
      quantity: 1

  - id: lj_sword_hilt
    name: Sword Hilt
    description: "A wrapped sulwood hilt, ready to receive a blade."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: treated_sulwood
        quantity: 2
    output:
      type: item
      id: sword_hilt
      quantity: 1

  - id: lj_sword_blade
    name: Sword Blade
    description: "A hardened sulwood blade, shaped and edged for cutting."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: treated_sulwood
        quantity: 3
    output:
      type: item
      id: sword_blade
      quantity: 1

  - id: lj_axe_handle
    name: Axe Handle
    description: "A thick sulwood handle, balanced for a heavy head."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: treated_sulwood
        quantity: 2
    output:
      type: item
      id: axe_handle
      quantity: 1

  - id: lj_axe_head
    name: Axe Head
    description: "A rough-hewn sulwood axe head, edged and hardened."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: treated_sulwood
        quantity: 3
    output:
      type: item
      id: axe_head
      quantity: 1

  - id: lj_shovel_handle
    name: Shovel Handle
    description: "A sturdy sulwood handle, ready for a blade."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: treated_sulwood
        quantity: 2
    output:
      type: item
      id: shovel_handle
      quantity: 1

  - id: lj_shovel_head
    name: Shovel Head
    description: "A shaped sulwood blade, ready to be fitted to a handle."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: treated_sulwood
        quantity: 3
    output:
      type: item
      id: shovel_head
      quantity: 1

  - id: lj_bow
    name: Sulwood Bow
    description: "Bend a sulwood stave into a bow and string it with treated fiber."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: treated_sulwood
        quantity: 5
    output:
      type: weapon
      id: bow

  - id: lj_sword_wood
    name: Sulwood Sword
    description: "Bind hilt and blade into a full sulwood sword."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: sword_hilt
        quantity: 1
      - item_id: sword_blade
        quantity: 1
    output:
      type: weapon
      id: sword_wood

  - id: lj_axe_wood
    name: Sulwood Axe
    description: "Lash the axe head to the handle and set the wedge."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: axe_handle
        quantity: 1
      - item_id: axe_head
        quantity: 1
    output:
      type: weapon
      id: axe_wood

  - id: lj_wand
    name: Sulwood Wand
    description: "Shape a slender sulwood rod — blank until attuned by an enchanter."
    profession: lumberjack
    required_level: 3
    ingredients:
      - item_id: treated_sulwood
        quantity: 2
    output:
      type: weapon
      id: wand

  - id: lj_hardwood
    name: Hardwood
    description: "Press-cure treated sulwood under high heat to produce dense, durable hardwood."
    profession: lumberjack
    required_level: 7
    ingredients:
      - item_id: treated_sulwood
        quantity: 3
    output:
      type: item
      id: hardwood
      quantity: 1
