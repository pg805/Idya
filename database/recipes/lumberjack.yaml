recipes:
  - id: lj_quarterstaff
    name: Quarterstaff
    description: "Shape a long, balanced length of sulwood into a fighting staff."
    profession: lumberjack
    required_level: 1
    ingredients:
      - item_id: sulwood
        quantity: 4
    output:
      type: weapon
      id: quarterstaff

  - id: lj_quarterstaff_treated
    name: Quarterstaff (Treated)
    description: "A quarterstaff crafted from treated sulwood — denser and better balanced than the raw version."
    profession: lumberjack
    required_level: 2
    ingredients:
      - item_id: treated_sulwood
        quantity: 4
    output:
      type: weapon
      id: quarterstaff
      base_bonus:
        attack: 1

  - id: lj_treated_sulwood
    name: Treated Sulwood
    description: "Cure raw sulwood with resin and heat, producing a denser, more workable material."
    profession: lumberjack
    required_level: 2
    ingredients:
      - item_id: sulwood
        quantity: 2
    output:
      type: item
      id: treated_sulwood
      quantity: 1

  - id: lj_sword_hilt
