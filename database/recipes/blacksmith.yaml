recipes:
  # Flat material -> weapon (intermediary smelting/components deferred — to be
  # re-added later by breaking these totals into parts). Cost curve: L1 = 12,
  # L2 = 100, L3 = 200 base material.

  - id: bs_pickaxe
    name: Pickaxe
    description: "Forge a sturdy miner's pickaxe from crude talamite."
    profession: blacksmith
    required_level: 1
    ingredients:
      - item_id: crude_talamite
        quantity: 12
    output:
      type: weapon
      id: pickaxe

  - id: bs_dagger
    name: Dagger
    description: "Shape crude talamite into a slim, quick blade."
    profession: blacksmith
    required_level: 2
    ingredients:
      - item_id: crude_talamite
        quantity: 100
    output:
      type: weapon
      id: dagger

  - id: bs_mace
    name: Mace
    description: "Forge a dense crude-talamite mace head and fit it to a shaft."
    profession: blacksmith
    required_level: 2
    ingredients:
      - item_id: crude_talamite
        quantity: 100
    output:
      type: weapon
      id: mace

  # Hybrid (wood haft + talamite edge). Crafted by the smith for now; split cost.
  - id: bs_battle_axe
    name: Battle Axe
    description: "A brutal slab of talamite on a sulwood haft — a smith's edge with a lumberjack's reach."
    profession: blacksmith
    required_level: 3
    ingredients:
      - item_id: sulwood
        quantity: 100
      - item_id: crude_talamite
        quantity: 100
    output:
      type: weapon
      id: battle_axe
