recipes:
  - id: bs_iron_ingot
    name: Iron Ingot
    description: "Smelt raw ore into a usable iron bar."
    profession: blacksmith
    required_level: 1
    ingredients:
      - item_id: iron_ore
        quantity: 3
    output:
      type: item
      id: iron_ingot
      quantity: 1

  - id: bs_shovel
    name: Shovel
    description: "A solid iron-headed shovel. Works well as a weapon too."
    profession: blacksmith
    required_level: 4
    ingredients:
      - item_id: shovel_handle
        quantity: 1
      - item_id: iron_ingot
        quantity: 2
    output:
      type: weapon
      id: shovel
