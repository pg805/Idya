Image: ""

Weapon:
  Name: Living Tar
  Description: A golnosar, dripping with the black resin that fuels it.
  Weight: 0
  Resource:
    Name: Tar
    Max: 10

  Defend:
    - Name: Tar Drink
      Type: 2
      Type_Name: Block
      Damage_Type: Arcane
      Damage_Subtype: Plant
      Value: 10
      Cost: -10
      Action_String: "<User> drinks deeply from its own tar pool, blocking 10 damage and restoring 10 Tar."

  Defend Crit:
    - Name: Tar Source
      Type: 10
      Type_Name: Buff Tile
      Damage_Type: Arcane
      Damage_Subtype: Plant
      Value: 5
      Area: 1
      Cost: 0
      Action_String: "<User> wells up a tar source — whoever holds the square strikes for +5."

  Attack:
    - Name: Tar Shot
      Type: 1
      Type_Name: Strike
      Damage_Type: Physical
      Damage_Subtype: Blunt
      Field: [10, 11, 12, 14, 15]
      Cost: 1
      Aimed: false
      Range: 1
      Action_String: "<User> spits a thick wad of tar at <Target> for <Damage> damage."

  Attack Crit:
    - Name: Blind
      Type: 5
      Type_Name: Debuff
      Damage_Type: Physical
      Damage_Subtype: Blunt
      Value: 14
      Rounds: 3
      Range: 2
      Action_String: "<User> blinds <Target> with a faceful of tar, debuffing their attack by 14 for 3 rounds."

  Special:
    - Name: Fistar
      Type: 4
      Type_Name: DOT
      Damage_Type: Arcane
      Damage_Subtype: Fire
      Field: [5, 8, 10, 14]
      Rounds: 5
      Cost: 4
      Aimed: true
      Range: 4
      Action_String: "<User> ignites a fistar above <Target>, burning for <Damage> damage per round for 5 rounds."

    - Name: Tar Pit
      Type: 13
      Type_Name: Slow Tile
      Damage_Type: Arcane
      Damage_Subtype: Plant
      Value: 2
      Area: 3
      Aimed: true
      Range: 3
      Cost: 3
      Action_String: "<User> floods a 3x3 area with sticky tar — slogging through it is slow going."

  Special Crit:
    - Name: Tar Suck
      Type: 6
      Type_Name: Heal
      Damage_Type: Arcane
      Damage_Subtype: Plant
      Value: 8
      Cost: 0
      Action_String: "<User> draws the spent tar back into itself, healing 8."
