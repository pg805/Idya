      Type: 2
      Type_Name: Block
      Damage_Type: Arcane
      Damage_Subtype: Mental
      Value: 0
      Cost: -5
      Action_String: "<User> draws on the arcane, restoring its Golsidaev."

  Defend Crit:
    - Name: Sidaev burst
      Type: 1
      Type_Name: Strike
      Damage_Type: Arcane
      Damage_Subtype: Mental
      Field: [20, 24, 27, 31, 38, 45, 48]
      Cost: -3
      Range: 2
      Action_String: "<User> bursts with Sidaev energy, lashing <Target> and drawing Golsidaev."

  Attack:
    - Name: SIFIS
      Type: 1
      Type_Name: Strike
      Damage_Type: Arcane
      Damage_Subtype: Fire
      Field: [20, 45, 45, 67, 67, 80]
      Cost: 1
      Range: 5
      Area: 3
      Push: 1
      Aimed: true
