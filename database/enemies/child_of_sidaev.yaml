    closing: "Drifting nearer, the air around it warping"
    holding: "Hanging in place, light bending toward it"
    fleeing: "Sliding back, never breaking its gaze"
  defensive:
    closing: "Edging in behind a haze of arcane motes"
    holding: "Wreathed in shifting light, gathering power"
    fleeing: "Folding space to slip away"
Resistances:
  Physical: 1.25   # frail body — physical blows land hard
  Arcane: 0.75     # steeped in the arcane; its own element slides off
  Fire: 0.75
