      Type_Name: Debuff
      Damage_Type: Arcane
      Damage_Subtype: Mental
      Value: 35
      Rounds: 5
      Range: 5
      Cost: 1
      Aimed: false
      Action_String: "<User> floods <Target>'s mind with panic, weakening its blows."
    - Name: Focus Sidaev
      Type: 1
      Type_Name: Strike
      Damage_Type: Arcane
      Damage_Subtype: Light
      Field: [63, 63, 70, 70, 70, 77, 77, 77, 77, 84, 84, 84, 84, 84]
      Cost: 5
      Area: 4
      Range: 3
      Aimed: true
      Action_String: "<User> focuses the light of Sidaev into a searing beam at <Target>."

  Special Crit:
    - Name: Call Dae
      Type: 10
      Type_Name: Buff Tile
      Damage_Type: Arcane
      Damage_Subtype: Light
      Value: 30
      Area: 3
      Action_String: "<User> calls the Dae, blessing the ground at its feet."
