    - Name: SINOS
      Type: 1
      Type_Name: Strike
      Damage_Type: Arcane
      Damage_Subtype: Dark
      Field: [30, 35, 40, 45, 50, 55, 60, 65, 70, 75]
      Cost: 3
      Range: 3
      Aimed: false
