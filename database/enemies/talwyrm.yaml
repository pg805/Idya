      Value: 5
      Area: 1
      Cost: 2
      Aimed: true
      Range: 3
      Action_String: "<User> erupts jagged crystal remnants under <Target> — foes that enter the tile take 5 damage."

  Special Crit:
    - Name: Aimed Shard
      Type: 1
      Type_Name: Strike
      Damage_Type: Physical
      Damage_Subtype: Sharp
      Field: [3, 5, 7]
      Cost: 0
      Range: 2
